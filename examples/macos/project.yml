name: FgVadDemo
options:
  bundleIdPrefix: com.fengur
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit
    from: "5.7.0"
  Fgvad:
    path: ../..  # 仓库根

targets:
  FgVadDemo:
    type: application
    platform: macOS
    dependencies:
      - package: SnapKit
      - package: Fgvad
        product: Fgvad
    info:
      path: FgVadDemo/Info.plist
      properties:
        CFBundleName: FgVadDemo
        CFBundleShortVersionString: "0.1.0"
        NSMicrophoneUsageDescription: "FgVadDemo 需要麦克风权限来录音并对 VAD 进行测试。"
        NSPrincipalClass: NSApplication
    sources:
      - path: FgVadDemo
      # 把 test-data 整套（short 6 个 case + long）作为 folder reference
      # 打包进 .app/Contents/Resources/short/ 和 long/。
      - path: ../../test-data/short
        group: TestAudio
        type: folder
        buildPhase: resources
      - path: ../../test-data/long
        group: TestAudio
        type: folder
        buildPhase: resources
    settings:
      base:
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        # 允许非签名的 dylib（开发期用 cargo 产出的 libfgvad.dylib）
        ENABLE_HARDENED_RUNTIME: "NO"
