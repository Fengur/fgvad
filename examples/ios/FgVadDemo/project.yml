name: FgVadDemo
options:
  bundleIdPrefix: com.fengur
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

schemes:
  FgVadDemo:
    build:
      targets:
        FgVadDemo: all

packages:
  Fgvad:
    path: ../../..  # 仓库根,Package.swift 在那里

targets:
  FgVadDemo:
    type: application
    platform: iOS
    info:
      path: FgVadDemo/Info.plist
      properties:
        CFBundleName: FgVadDemo
        CFBundleShortVersionString: "0.1.0"
        NSMicrophoneUsageDescription: "FgVadDemo 需要麦克风权限来录音并对 VAD 进行测试。"
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    sources:
      - path: FgVadDemo
      # 把 test-data 整套（short 6 个 case + long yixi 47MB）作为 folder
      # reference 打包进 .app/short/ 和 .app/long/。yixi 单文件 47MB，让
      # app size 涨到 ~50MB——可接受（hobby demo 用，不分发 App Store）。
      - path: ../../../test-data/short
        group: TestAudio
        type: folder
        buildPhase: resources
      - path: ../../../test-data/long
        group: TestAudio
        type: folder
        buildPhase: resources
    dependencies:
      - package: Fgvad
        product: Fgvad
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_OBJC_BRIDGING_HEADER: FgVadDemo/FgVadDemo-Bridging-Header.h
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/Frameworks"
        ENABLE_HARDENED_RUNTIME: "NO"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        ALLOW_TARGET_PLATFORM_SPECIALIZATION: "YES"
    postBuildScripts:
      - name: "嵌入 libfgvad.dylib 和 ten_vad.framework 到 .app"
        script: |
          set -e
          FRAMEWORKS_DIR="$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH"
          mkdir -p "$FRAMEWORKS_DIR"

          # 选对应平台的 cargo target 目录
          if [[ "$EFFECTIVE_PLATFORM_NAME" == "-iphoneos" ]]; then
            RUST_TARGET="aarch64-apple-ios"
            TEN_VAD_DIR="$PROJECT_DIR/../../../vendor/ten-vad/iOS/device"
          else
            RUST_TARGET="aarch64-apple-ios-sim"
            TEN_VAD_DIR="$PROJECT_DIR/../../../vendor/ten-vad/iOS/simulator"
          fi

          # 用与 app 相同的签名身份（simulator 时是 -, device 时是 Apple Development 证书 SHA）
          SIGN_IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:--}"

          # 1) libfgvad.dylib
          cp -f "$PROJECT_DIR/../../../target/$RUST_TARGET/debug/libfgvad.dylib" \
                "$FRAMEWORKS_DIR/libfgvad.dylib"
          chmod 755 "$FRAMEWORKS_DIR/libfgvad.dylib"
          codesign --force --sign "$SIGN_IDENTITY" "$FRAMEWORKS_DIR/libfgvad.dylib"

          # 2) ten_vad.framework
          rm -rf "$FRAMEWORKS_DIR/ten_vad.framework"
          cp -R "$TEN_VAD_DIR/ten_vad.framework" "$FRAMEWORKS_DIR/"
          codesign --force --sign "$SIGN_IDENTITY" "$FRAMEWORKS_DIR/ten_vad.framework"
        basedOnDependencyAnalysis: false
